# worksheet structure definition for creating and formatting worksheets
worksheet-defs:
# -toc worksheet
  '-toc':
    index:            0
    num-rows:         5
    num-columns:      29
    frozen-rows:      2
    frozen-columns:   0
    
    columns:
      # section
      A:
        halign: center
        size: 60

      # heading
      B:
        halign: left
        size: 300

      # process
      C:
        halign: center
        size: 80

      # level
      D:
        halign: center
        size: 80

      # content-type
      E:
        halign: center
        size: 80

      # link
      F:
        halign: left
        size: 200

      # break
      G:
        halign: center
        size: 80

      # page-spec
      H:
        halign: center
        size: 80

      # margin-spec
      I:
        halign: center
        size: 100

      # landscape
      J:
        halign: center
        size: 80

      # heading-style
      K:
        halign: left
        size: 100

      # bookmark
      L:
        halign: left
        size: 80

      # jpeg-quality
      M:
        halign: center
        size: 80

      # page-list
      N:
        halign: left
        size: 80

      # autocrop
      O:
        halign: center
        size: 80

      # page-bg
      P:
        halign: center
        size: 80

      # hide-heading
      Q:
        halign: center
        size: 80

      # header-first
      R:
        halign: left
        size: 80

      # header-odd
      S:
        halign: left
        size: 80

      # header-even
      T:
        halign: left
        size: 80

      # footer-first
      U:
        halign: left
        size: 80

      # footer-odd
      V:
        halign: left
        size: 80

      # footer-even
      W:
        halign: left
        size: 100

      # override-header
      X:
        halign: center
        size: 80

      # override-footer
      Y:
        halign: center
        size: 80

      # responsible
      Z:
        halign: left
        size: 80

      # reviewer
      AA:
        halign: left
        size: 80

      # status
      AB:
        halign: left
        size: 160

      # comment
      AC:
        halign: left
        size: 300

    ranges:
      # the worksheet wide specs
        'A1:AC':
          font-family       : Arial
          font-size         : 10
          valign            : top

      # row 1 - column pixel size 
        # center align row 1
        'A1:AC1':
          halign: center

        A1:
          value:  60
        B1:
          value:  300
        C1:
          value:  80
        D1:
          value:  80
        E1:
          value:  80
        F1:
          value:  200
        G1:
          value:  80
        H1:
          value:  80
        I1:
          value:  100
        J1:
          value:  80
        K1:
          value:  80
        L1:
          value:  80
        M1:
          value:  80
        N1:
          value:  80
        O1:
          value:  80
        P1:
          value:  80
        Q1:
          value:  80
        R1:
          value:  80
        S1:
          value:  80
        T1:
          value:  80
        U1:
          value:  80
        V1:
          value:  80
        W1:
          value:  80
        X1:
          value:  80
        Y1:
          value:  80
        Z1:
          value:  80
        AA1:
          value:  80
        AB1:
          value:  160
        AC1:
          value:  300

      # row 2 - column labels
        # labels are bold
        'A2:AC2':
          bold:   true

        A2:
          value:  'section'
        B2:
          value:  'heading'
        C2:
          value:  'process'
        D2:
          value:  'level'
        E2:
          value:  'content-type'
        F2:
          value:  'link'
        G2:
          value:  'break'
        H2:
          value:  'page-spec'
        I2:
          value:  'margin-spec'
        J2:
          value:  'landscape'
        K2:
          value:  'heading-style'
        L2:
          value:  'bookmark'
        M2:
          value:  'jpeg-quality'
        N2:
          value:  'page-list'
        O2:
          value:  'autocrop'
        P2:
          value:  'page-bg'
        Q2:
          value:  'hide-heading'
        R2:
          value:  'header-first'
        S2:
          value:  'header-odd'
        T2:
          value:  'header-even'
        U2:
          value:  'footer-first'
        V2:
          value:  'footer-odd'
        W2:
          value:  'footer-even'
        X2:
          value:  'override-header'
        Y2:
          value:  'override-footer'
        Z2:
          value:  'responsible'
        AA2:
          value:  'reviewer'
        AB2:
          value:  'status'
        AC2:
          value:  'comment'
    
      # row 3 - data validations
        # section is plain text
        'A3:A':
          number-format: 'TEXT'
        
        # process
        'C3:C':
          validation-list:
            - 'Yes'

        # level
        'D3:D':
          validation-list:
            - '0'
            - '1'
            - '2'
            - '3'
            - '4'
            - '5'
            - '6'

        # content-type
        'E3:E':
          validation-list:
            - table
            - pdf
            - gsheet
            - toc
            - lof
            - lot

        # break
        'G3:G':
          validation-list:
            - page
            - section

        # page-spec
        'H3:H':
          validation-list:
            - A4
            - A3
            - Letter
            - Legal

        # margin-spec
        'I3:I':
          validation-list:
            - wide
            - medium
            - narrow
            - none
            - book-bind
            - secl-pad
            - doer-pad
            - stamp
            - narrow-no-header
            - narrow-no-footer
            - narrow-no-header-footer

        # landscape
        'J3:J':
          validation-list:
            - 'Yes'

        # autocrop
        'O3:O':
          validation-list:
            - 'Yes'

        # page-bg
        'P3:P':
          validation-list:
            - 'Yes'

        # hide-heading
        'Q3:Q':
          validation-list:
            - 'Yes'

        # override-header
        'X3:X':
          validation-list:
            - 'Yes'

        # override-footer
        'Y3:Y':
          validation-list:
            - 'Yes'

        # status
        'AB3:AB':
          validation-list:
            - pending
            - under-documentation
            - ready-for-review
            - under-review
            - finalized

      # row 3 - Cover Page
        # section
        A3:
          value: 

        # heading
        B3:
          value: 'Cover Page'

        # process
        C3:
          value: 'Yes'

        # level
        D3:
          value: '0'

        # content-type
        E3:
          value: 'table'

        # link
        F3:
          value: '00.00-coverpage'
          ws-name-to-link: '00.00-coverpage'

        # break
        G3:
          value: 

        # page-spec
        H3:
          value: 'A4'

        # margin-spec
        I3:
          value: 'none'

        # hide-heading
        Q3:
          value: 'Yes'

        # header-odd
        S3:
          value: 

        # footer-odd
        V3:
          value: 

      # row 4 - Table of Contents
        # section
        A4:
          value: 

        # heading
        B4:
          value: 'Table of Contents'

        # process
        C4:
          value: 'Yes'

        # level
        D4:
          value: '0'

        # content-type
        E4:
          value: 'toc'

        # link
        F4:
          value: 

        # break
        G4:
          value: 'section'

        # page-spec
        H4:
          value: 'A4'

        # margin-spec
        I4:
          value: 'narrow'

        # hide-heading
        Q4:
          value: 

        # header-odd
        S4:
          value: 'z-head'
          ws-name-to-link: 'z-head'

        # footer-odd
        V4:
          value: 'z-foot'
          ws-name-to-link: 'z-foot'

      # row 5 - Chapter 1
        # section
        A5:
          value: '1. '

        # heading
        B5:
          value: 'Chapter 1'

        # process
        C5:
          value: 'Yes'

        # level
        D5:
          value: '1'

        # content-type
        E5:
          value: 'table'

        # link
        F5:
          value: 

        # break
        G5:
          value: 'section'

        # page-spec
        H5:
          value: 'A4'

        # margin-spec
        I5:
          value: 'narrow'

        # hide-heading
        Q5:
          value: 

        # header-odd
        S5:
          value: 'z-head'
          ws-name-to-link: 'z-head'

        # footer-odd
        V5:
          value: 'z-foot'
          ws-name-to-link: 'z-foot'

    cell-empty-markers:
      # responsible, reviewer and status should not be empty
      - 'Z3:AB'

# 00.00-coverpage worksheet
  '00.00-coverpage':
    num-rows:         20
    num-columns:      4
    frozen-rows:      2
    frozen-columns:   0
    review-notes:     true

    columns:
      # review-notes
      'A':
        size: 100
        halign: left
        wrap: true

      # content
      'B':
        size: 100
        halign: center
        wrap: true

      'C':
        size: 600
        halign: center
        wrap: true

      'D':
        size: 100
        halign: center
        wrap: true

    rows:
      '17':
        size: 30

    ranges:
      # the worksheet wide specs
        'A1:D':
          font-family       : Arial
          font-size         : 10
          valign            : top

      # row 1 - column pixel size 
        'A1':
          value: '-toc'
          ws-name-to-link: '-toc'

        # center align row 1
        'B1:D1':
          halign: center

        'B1':
          value: 100

        'C1':
          value: 600

        'D1':
          value: 100

      # row 2 - column labels
        # labels are bold
        'A2:D2':
          bold:   true

        'A2':
          value: review-notes

        'B2:D2':
          value: content
          merge: true
          halign: left

      # row 16 - Title
        'B16:D16':
          value: 'Document Title'
          halign: center
          valign: middle
          font-family: 'Bree Serif'
          font-size: 48
          fgcolor: '#5b0f00'
          bold: true
          merge: true

      # row 16 - Line Art
        'B17:D17':
          value: >-
            =image("https://spectrum-bd.biz/data/artifacts/line-separators/hor-line-separator-01.png",1)
          halign: center
          valign: middle
          merge: true

      # row 16 - Subtitle
        'B18:D18':
          value: 'Document Subtitle'
          halign: center
          valign: middle
          font-family: 'Comfortaa'
          font-size: 24
          fgcolor: '#434343'
          merge: true

# z-blank worksheet
  'z-blank':
    num-rows:         3
    num-columns:      3
    frozen-rows:      2
    frozen-columns:   0
    review-notes:     true

    columns:
      # review-notes
      'A':
        size: 100
        halign: left
        wrap: true

      # content
      'B':
        size: 40
        halign: left
        wrap: true

      'C':
        size: 760
        halign: left
        wrap: true

    ranges:
      # the worksheet wide specs
        'A1:C':
          font-family       : Arial
          font-size         : 10
          valign            : top

      # row 1 - column pixel size 
        'A1':
          value: '-toc'
          ws-name-to-link: '-toc'

        # center align row 1
        'B1:C1':
          halign: center

        'B1':
          value: 40

        'C1':
          value: 760

      # row 2 - column labels
        # labels are bold
        'A2:C2':
          bold:   true

        'A2':
          value: review-notes

        'B2:C2':
          value: content
          merge: true
          halign: left

# z-head worksheet
  'z-head':
    num-rows:         3
    num-columns:      3
    frozen-rows:      2
    frozen-columns:   0
    review-notes:     true

    columns:
      # review-notes
      'A':
        size: 100
        halign: left
        wrap: true

      # content
      'B':
        size: 700
        halign: left
        wrap: true

      'C':
        size: 100
        halign: right
        wrap: true

    ranges:
      # the worksheet wide specs
        'A1:C':
          font-family       : Arial
          font-size         : 10
          valign            : top

      # row 1 - column pixel size 
        'A1':
          value: '-toc'
          ws-name-to-link: '-toc'

        # center align row 1
        'B1:C1':
          halign: center

        'B1':
          value: 700

        'C1':
          value: 100

      # row 2 - column labels
        # labels are bold
        'A2:C2':
          bold:   true

        'A2':
          value: review-notes

        'B2:C2':
          value: content
          merge: true
          halign: left

      # row 3 
        # onwards fonts are size 9, light color
        'A3:C':
          font-family       : Arial
          font-size         : 9
          fgcolor           : '#666666' 

        'B3:C':
          border-color  : '#B7B7B7'
          inner-border  : False
          border-list   :
            - bottom
          border-style  : SOLID

        'B3':
          value: '[Header Text]'

        'C3':
          value: >-
            =image("https://spectrum-bd.biz/data/artifacts/res/logo/spectrum-logo-small-111x89.png",1)
          halign: right

    cell-empty-markers:
      - 'B3:C'

# z-foot worksheet
  'z-foot':
    num-rows:         3
    num-columns:      3
    frozen-rows:      2
    frozen-columns:   0
    review-notes:     true

    columns:
      # review-notes
      'A':
        size: 100
        halign: left
        wrap: true

      # content
      'B':
        size: 600
        halign: left
        wrap: true

      'C':
        size: 200
        halign: right
        wrap: true

    ranges:
      # the worksheet wide specs
        'A1:C':
          font-family       : Arial
          font-size         : 10
          valign            : top

      # row 1 - column pixel size 
        'A1':
          value: '-toc'
          ws-name-to-link: '-toc'

        # center align row 1
        'B1:C1':
          halign: center
        
        'B1':
          value: 600

        'C1':
          value: 200

      # row 2 - column labels
        # labels are bold
        'A2:C2':
          bold:   true

        'A2':
          value: 'review-notes'
        
        'B2:C2':
          value: 'content'
          merge: true
          halign: left

      # row 3 
        # onwards fonts are size 9, light color
        'A3:C':
          font-family       : Arial
          font-size         : 9
          fgcolor           : '#666666' 

        'B3:C':
          border-color  : '#B7B7B7'
          inner-border  : False
          border-list   :
            - top
          border-style  : SOLID

        'B3':
          value: '[Footer Text]'

        'C3':
          value: 'Page PAGE{} of PAGE{*}'
          halign: right

    cell-empty-markers:
      - 'B3:C'

# zz-page-specs worksheet
  'zz-page-specs':
    num-rows:         6
    num-columns:      4
    frozen-rows:      2
    frozen-columns:   0

    columns:
      # key
      A:
        halign: left
        size: 100

      # width
      B:
        halign: center
        size: 100

      # height
      C:
        halign: center
        size: 100

      # name
      D:
        halign: left
        size: 100

    ranges:
      # the worksheet wide specs
        'A1:D':
          font-family       : Arial
          font-size         : 10
          valign            : top

      #  row 1 
        'A1':
          value: '-toc'
          ws-name-to-link: '-toc'
