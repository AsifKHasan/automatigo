      #  row 5 
        A5:
          value:  'Letter'
        B5:
          value:  '8.50'
        C5:
          value:  '11.00'
        D5:
          value:  'letterpaper'

      #  row 6 
        A6:
          value:  'Legal'
        B6:
          value:  '8.50'
        C6:
          value:  '14.00'
        D6:
          value:  'legalpaper'

