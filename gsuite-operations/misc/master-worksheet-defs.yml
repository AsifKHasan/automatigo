        'A2:D2':
          bold:   true

        A2:
          value:  'key'
        B2:
          value:  'width'
        C2:
          value:  'height'
        D2:
          value:  'name'

      #  row 3 
        A3:
          value:  'A4'
        B3:
          value:  '8.27'
        C3:
          value:  '11.69'
        D3:
          value:  'a4paper'

      #  row 4 
        A3:
          value:  'A3'
        B3:
          value:  '11.69'
        C3:
          value:  '16.54'
        D3:
          value:  'a3paper'

      #  row 5 
        A3:
